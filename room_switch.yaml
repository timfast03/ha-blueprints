blueprint:
  name: "Room Switch (4 Tasten)"
  source_url: "https://github.com/timfast03/ha-blueprints/blob/main/room_switch.yaml"
  description: >
    # 🔘 Room Switch


    **Version: 1.0**


    Modularer 4-Tasten-Schalter für Aqara, Zigbee und andere
    Event-basierte Schalter. Jede Taste ist individuell konfigurierbar.
    Kompatibel mit der Room Lighting Blueprint.


    **Pro Taste konfigurierbar:**
    Licht-Toggle, Szene aktivieren, Bypass steuern, Besuch-Modus,
    Alles-AUS, oder beliebige Entity toggeln.


    **Toggle-Logik:** Deckenlampe aus → an, Deckenlampe an → Szene hell.
    AN/Szenen-Tasten heben einen aktiven Bypass AUS automatisch auf.
  domain: automation
  input:

    # ══════════════════════════════════════════════════════════════
    #  TASTE 1 (z.B. Oben Links)
    # ══════════════════════════════════════════════════════════════
    button_1_settings:
      name: "Taste 1"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        button_1_entity:
          name: "Taste 1 - Event Entity *"
          description: >
            Die Event-Entity der Taste (z.B. event.aqara_taste_5).
            Leer lassen um diese Taste zu deaktivieren.
          default: []
          selector:
            entity:
              filter:
                domain: event
        button_1_action:
          name: "Taste 1 - Aktion"
          description: >
            Was soll bei Tastendruck passieren?
          default: "toggle_light"
          selector:
            select:
              options:
                - label: "Toggle Licht (aus→an, an→Szene hell)"
                  value: "toggle_light"
                - label: "Szene aktivieren"
                  value: "activate_scene"
                - label: "Raum AUS (Bypass + alle Lichter aus)"
                  value: "room_off"
                - label: "Alles AUS (mehrere Bereiche)"
                  value: "all_off"
                - label: "Besuch-Szene + Modus aktivieren"
                  value: "guest_on"
                - label: "Entity toggeln"
                  value: "toggle_entity"
        button_1_light:
          name: "Taste 1 - Hauptlicht (für Toggle)"
          description: >
            Das Licht das geprüft wird (aus→an) und das eingeschaltet wird.
            Nur relevant bei Aktion "Toggle Licht".
          default: []
          selector:
            entity:
              filter:
                domain: light
        button_1_scene:
          name: "Taste 1 - Szene"
          description: >
            Die Szene für "Toggle hell" oder "Szene aktivieren".
          default: []
          selector:
            entity:
              filter:
                domain: scene
        button_1_off_lights:
          name: "Taste 1 - AUS-Lichter"
          description: >
            Lichter die bei "Raum AUS" oder "Alles AUS" ausgeschaltet werden.
          default: []
          selector:
            entity:
              filter:
                domain: light
              multiple: true
        button_1_off_area:
          name: "Taste 1 - AUS-Bereich (Area)"
          description: >
            Zusätzlicher Bereich der bei "Alles AUS" ausgeschaltet wird.
            Leer lassen wenn nicht benötigt.
          default: ""
          selector:
            text:
        button_1_bypass_off:
          name: "Taste 1 - Bypass AUS Helper"
          description: >
            Der Bypass-AUS Helper der bei "Raum AUS"/"Alles AUS" aktiviert wird
            und bei "Toggle"/"Szene"/"Besuch" deaktiviert wird.
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_1_guest_boolean:
          name: "Taste 1 - Besuch-Modus Helper"
          description: >
            Der Besuch-Modus Helper. Nur für Aktion "Besuch-Szene"
            und "Alles AUS" (dort wird er ausgeschaltet).
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_1_scene_memory_text:
          name: "Taste 1 - Szenen-Gedächtnis Text"
          description: >
            Input-Text für Szenen-Gedächtnis leeren bei Besuch/AUS.
          default: []
          selector:
            entity:
              filter:
                domain: input_text
        button_1_scene_memory_active:
          name: "Taste 1 - Szenen-Gedächtnis Flag"
          description: >
            Input-Boolean für Szenen-Gedächtnis leeren bei Besuch/AUS.
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_1_toggle_entity:
          name: "Taste 1 - Toggle Entity"
          description: >
            Entity die bei "Entity toggeln" umgeschaltet wird.
          default: []
          selector:
            entity: {}

    # ══════════════════════════════════════════════════════════════
    #  TASTE 2 (z.B. Oben Rechts)
    # ══════════════════════════════════════════════════════════════
    button_2_settings:
      name: "Taste 2"
      icon: "mdi:gesture-tap"
