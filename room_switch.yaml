              filter:
                domain: light
              multiple: true
        button_2_off_area:
          name: "Taste 2 - AUS-Bereich (Area)"
          default: ""
          selector:
            text:
        button_2_bypass_off:
          name: "Taste 2 - Bypass AUS Helper"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_2_guest_boolean:
          name: "Taste 2 - Besuch-Modus Helper"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_2_scene_memory_text:
          name: "Taste 2 - Szenen-Gedächtnis Text"
          default: []
          selector:
            entity:
              filter:
                domain: input_text
        button_2_scene_memory_active:
          name: "Taste 2 - Szenen-Gedächtnis Flag"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_2_toggle_entity:
          name: "Taste 2 - Toggle Entity"
          default: []
          selector:
            entity: {}

    # ══════════════════════════════════════════════════════════════
    #  TASTE 3 (z.B. Unten Links)
    # ══════════════════════════════════════════════════════════════
    button_3_settings:
      name: "Taste 3"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        button_3_entity:
          name: "Taste 3 - Event Entity *"
          default: []
          selector:
            entity:
              filter:
                domain: event
        button_3_action:
          name: "Taste 3 - Aktion"
          default: "activate_scene"
          selector:
            select:
              options:
                - label: "Toggle Licht (aus→an, an→Szene hell)"
                  value: "toggle_light"
                - label: "Szene aktivieren"
                  value: "activate_scene"
                - label: "Raum AUS (Bypass + alle Lichter aus)"
                  value: "room_off"
                - label: "Alles AUS (mehrere Bereiche)"
                  value: "all_off"
                - label: "Besuch-Szene + Modus aktivieren"
                  value: "guest_on"
                - label: "Entity toggeln"
                  value: "toggle_entity"
        button_3_light:
          name: "Taste 3 - Hauptlicht"
          default: []
          selector:
            entity:
              filter:
                domain: light
        button_3_scene:
          name: "Taste 3 - Szene"
          default: []
          selector:
            entity:
              filter:
                domain: scene
        button_3_off_lights:
          name: "Taste 3 - AUS-Lichter"
          default: []
          selector:
            entity:
              filter:
                domain: light
              multiple: true
        button_3_off_area:
          name: "Taste 3 - AUS-Bereich (Area)"
          default: ""
          selector:
            text:
        button_3_bypass_off:
          name: "Taste 3 - Bypass AUS Helper"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_3_guest_boolean:
          name: "Taste 3 - Besuch-Modus Helper"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_3_scene_memory_text:
          name: "Taste 3 - Szenen-Gedächtnis Text"
          default: []
          selector:
            entity:
              filter:
                domain: input_text
        button_3_scene_memory_active:
          name: "Taste 3 - Szenen-Gedächtnis Flag"
          default: []
          selector:
            entity:
              filter:
                domain: input_boolean
        button_3_toggle_entity:
          name: "Taste 3 - Toggle Entity"
          default: []
          selector:
            entity: {}

    # ══════════════════════════════════════════════════════════════
    #  TASTE 4 (z.B. Unten Rechts)
    # ══════════════════════════════════════════════════════════════
    button_4_settings:
      name: "Taste 4"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        button_4_entity:
          name: "Taste 4 - Event Entity *"
          default: []
          selector:
            entity:
              filter:
                domain: event
        button_4_action:
          name: "Taste 4 - Aktion"
          default: "room_off"
          selector:
            select:
              options:
                - label: "Toggle Licht (aus→an, an→Szene hell)"
                  value: "toggle_light"
                - label: "Szene aktivieren"
                  value: "activate_scene"
                - label: "Raum AUS (Bypass + alle Lichter aus)"
                  value: "room_off"
                - label: "Alles AUS (mehrere Bereiche)"
                  value: "all_off"
                - label: "Besuch-Szene + Modus aktivieren"
                  value: "guest_on"
                - label: "Entity toggeln"
