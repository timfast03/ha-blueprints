# ══════════════════════════════════════════════════════════════
#  VARIABLEN
# ══════════════════════════════════════════════════════════════
variables:
  b1_action: !input button_1_action
  b1_light: !input button_1_light
  b1_scene: !input button_1_scene
  b1_off_lights: !input button_1_off_lights
  b1_off_area: !input button_1_off_area
  b1_bypass_off: !input button_1_bypass_off
  b1_guest: !input button_1_guest_boolean
  b1_mem_text: !input button_1_scene_memory_text
  b1_mem_active: !input button_1_scene_memory_active
  b1_toggle: !input button_1_toggle_entity
  b2_action: !input button_2_action
  b2_light: !input button_2_light
  b2_scene: !input button_2_scene
  b2_off_lights: !input button_2_off_lights
  b2_off_area: !input button_2_off_area
  b2_bypass_off: !input button_2_bypass_off
  b2_guest: !input button_2_guest_boolean
  b2_mem_text: !input button_2_scene_memory_text
  b2_mem_active: !input button_2_scene_memory_active
  b2_toggle: !input button_2_toggle_entity
  b3_action: !input button_3_action
  b3_light: !input button_3_light
  b3_scene: !input button_3_scene
  b3_off_lights: !input button_3_off_lights
  b3_off_area: !input button_3_off_area
  b3_bypass_off: !input button_3_bypass_off
  b3_guest: !input button_3_guest_boolean
  b3_mem_text: !input button_3_scene_memory_text
  b3_mem_active: !input button_3_scene_memory_active
  b3_toggle: !input button_3_toggle_entity
  b4_action: !input button_4_action
  b4_light: !input button_4_light
  b4_scene: !input button_4_scene
  b4_off_lights: !input button_4_off_lights
  b4_off_area: !input button_4_off_area
  b4_bypass_off: !input button_4_bypass_off
  b4_guest: !input button_4_guest_boolean
  b4_mem_text: !input button_4_scene_memory_text
  b4_mem_active: !input button_4_scene_memory_active
  b4_toggle: !input button_4_toggle_entity

# ══════════════════════════════════════════════════════════════
#  TRIGGER
# ══════════════════════════════════════════════════════════════
triggers:
  - trigger: state
    entity_id: !input button_1_entity
    to: null
    id: button_1
  - trigger: state
    entity_id: !input button_2_entity
    to: null
    id: button_2
  - trigger: state
    entity_id: !input button_3_entity
    to: null
    id: button_3
  - trigger: state
    entity_id: !input button_4_entity
    to: null
    id: button_4

conditions: []
mode: single

# ══════════════════════════════════════════════════════════════
#  ACTIONS: Generische Verarbeitung pro Taste
# ══════════════════════════════════════════════════════════════
actions:
  # Variablen für aktuelle Taste setzen
  - variables:
      btn_action: >
        {% if trigger.id == 'button_1' %}{{ b1_action }}
        {% elif trigger.id == 'button_2' %}{{ b2_action }}
        {% elif trigger.id == 'button_3' %}{{ b3_action }}
        {% elif trigger.id == 'button_4' %}{{ b4_action }}
        {% endif %}
      btn_light: >
        {% if trigger.id == 'button_1' %}{{ b1_light }}
        {% elif trigger.id == 'button_2' %}{{ b2_light }}
        {% elif trigger.id == 'button_3' %}{{ b3_light }}
        {% elif trigger.id == 'button_4' %}{{ b4_light }}
        {% endif %}
      btn_scene: >
        {% if trigger.id == 'button_1' %}{{ b1_scene }}
        {% elif trigger.id == 'button_2' %}{{ b2_scene }}
        {% elif trigger.id == 'button_3' %}{{ b3_scene }}
        {% elif trigger.id == 'button_4' %}{{ b4_scene }}
        {% endif %}
      btn_off_lights: >
        {% if trigger.id == 'button_1' %}{{ b1_off_lights }}
        {% elif trigger.id == 'button_2' %}{{ b2_off_lights }}
        {% elif trigger.id == 'button_3' %}{{ b3_off_lights }}
        {% elif trigger.id == 'button_4' %}{{ b4_off_lights }}
        {% endif %}
      btn_off_area: >
        {% if trigger.id == 'button_1' %}{{ b1_off_area }}
        {% elif trigger.id == 'button_2' %}{{ b2_off_area }}
        {% elif trigger.id == 'button_3' %}{{ b3_off_area }}
        {% elif trigger.id == 'button_4' %}{{ b4_off_area }}
        {% endif %}
      btn_bypass_off: >
        {% if trigger.id == 'button_1' %}{{ b1_bypass_off }}
        {% elif trigger.id == 'button_2' %}{{ b2_bypass_off }}
        {% elif trigger.id == 'button_3' %}{{ b3_bypass_off }}
        {% elif trigger.id == 'button_4' %}{{ b4_bypass_off }}
        {% endif %}
      btn_guest: >
        {% if trigger.id == 'button_1' %}{{ b1_guest }}
        {% elif trigger.id == 'button_2' %}{{ b2_guest }}
        {% elif trigger.id == 'button_3' %}{{ b3_guest }}
        {% elif trigger.id == 'button_4' %}{{ b4_guest }}
        {% endif %}
      btn_mem_text: >
        {% if trigger.id == 'button_1' %}{{ b1_mem_text }}
        {% elif trigger.id == 'button_2' %}{{ b2_mem_text }}
        {% elif trigger.id == 'button_3' %}{{ b3_mem_text }}
        {% elif trigger.id == 'button_4' %}{{ b4_mem_text }}
        {% endif %}
      btn_mem_active: >
        {% if trigger.id == 'button_1' %}{{ b1_mem_active }}
        {% elif trigger.id == 'button_2' %}{{ b2_mem_active }}
        {% elif trigger.id == 'button_3' %}{{ b3_mem_active }}
        {% elif trigger.id == 'button_4' %}{{ b4_mem_active }}
        {% endif %}
      btn_toggle: >
        {% if trigger.id == 'button_1' %}{{ b1_toggle }}
        {% elif trigger.id == 'button_2' %}{{ b2_toggle }}
        {% elif trigger.id == 'button_3' %}{{ b3_toggle }}
        {% elif trigger.id == 'button_4' %}{{ b4_toggle }}
        {% endif %}

  # ── Aktion ausführen ──
  - choose:

      # ── TOGGLE LICHT ──
      - conditions:
          - "{{ btn_action == 'toggle_light' }}"
        sequence:
          # Bypass AUS aufheben
          - if:
              - "{{ btn_bypass_off | length > 0 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_bypass_off }}"
          # Toggle: Licht aus → an, an → Szene hell
          - if:
              - "{{ is_state(btn_light, 'off') }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: "{{ btn_light }}"
            else:
              - action: scene.turn_on
                target:
                  entity_id: "{{ btn_scene }}"

      # ── SZENE AKTIVIEREN ──
      - conditions:
          - "{{ btn_action == 'activate_scene' }}"
        sequence:
          - if:
              - "{{ btn_bypass_off | length > 0 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_bypass_off }}"
          - action: scene.turn_on
            target:
              entity_id: "{{ btn_scene }}"

      # ── RAUM AUS ──
      - conditions:
          - "{{ btn_action == 'room_off' }}"
        sequence:
          - if:
              - "{{ btn_bypass_off | length > 0 }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ btn_bypass_off }}"
          - action: light.turn_off
            target:
              entity_id: "{{ btn_off_lights }}"
          # Szenen-Gedächtnis leeren
          - if:
              - "{{ btn_mem_text | length > 0 }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: "{{ btn_mem_text }}"
                data:
                  value: ""
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_mem_active }}"

      # ── ALLES AUS ──
      - conditions:
          - "{{ btn_action == 'all_off' }}"
        sequence:
          - if:
              - "{{ btn_bypass_off | length > 0 }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ btn_bypass_off }}"
          # Besuch-Modus ausschalten
          - if:
              - "{{ btn_guest | length > 0 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_guest }}"
          - action: light.turn_off
            target:
              entity_id: "{{ btn_off_lights }}"
          - if:
              - "{{ btn_off_area | length > 0 }}"
            then:
              - action: light.turn_off
                target:
                  area_id: "{{ btn_off_area }}"
          # Szenen-Gedächtnis leeren
          - if:
              - "{{ btn_mem_text | length > 0 }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: "{{ btn_mem_text }}"
                data:
                  value: ""
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_mem_active }}"

      # ── BESUCH-SZENE + MODUS ──
      - conditions:
          - "{{ btn_action == 'guest_on' }}"
        sequence:
          - if:
              - "{{ btn_bypass_off | length > 0 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_bypass_off }}"
          - if:
              - "{{ btn_guest | length > 0 }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ btn_guest }}"
          # Szenen-Gedächtnis leeren
          - if:
              - "{{ btn_mem_text | length > 0 }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: "{{ btn_mem_text }}"
                data:
                  value: ""
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ btn_mem_active }}"
          - action: scene.turn_on
            target:
              entity_id: "{{ btn_scene }}"

      # ── ENTITY TOGGELN ──
      - conditions:
          - "{{ btn_action == 'toggle_entity' }}"
        sequence:
          - action: homeassistant.toggle
            target:
              entity_id: "{{ btn_toggle }}"
